<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Baguio Botanical Garden | Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style> 
        /* FONT FIX: Ensure case-sensitivity matches your GitHub 'Assets' folder exactly */
        @font-face {
            font-family: 'Agrandir';
            src: url('Assets/Agrandir-Regular.woff2') format('woff2');
            font-weight: normal; 
            font-style: normal;
            font-display: swap;
        }

        :root { 
            --brand: #00A699; 
            --dark: #1a1a1a; 
            /* Fallback fonts added for better stability */
            --font-main: 'Agrandir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: var(--font-main); 
            overflow: hidden; background: #d1d5db; 
        }
        
        #map { height: 100vh; width: 100vw; z-index: 1; background: #d1d5db; }

        /* PANO OVERLAY */
        #pano-overlay-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; background: #000;
            pointer-events: auto !important;
        }

        .pano-top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--dark); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            z-index: 2001; border-bottom: 2px solid var(--brand);
        }

        .pano-title { color: white; font-weight: 800; font-size: 16px; }

        .exit-pill-btn {
            background: var(--brand); color: white; border: none;
            padding: 10px 22px; border-radius: 50px; font-weight: 800;
            font-size: 12px; cursor: pointer; text-transform: uppercase;
        }

        #pano-frame { 
            position: absolute; top: 60px; left: 0;
            width: 100%; height: calc(100% - 60px); 
            border: none; z-index: 2000; pointer-events: auto !important;
        }

        /* MAP ELEMENTS */
        .leaflet-top.leaflet-left { top: 80px; }
        .brand-pin-wrapper { position: relative; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; }
        .brand-pin { width: 24px; height: 24px; background: var(--brand); border: 2.5px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 4px 8px rgba(0,0,0,0.3); position: absolute; }
        .pin-number { position: relative; z-index: 2; color: white; font-size: 11px; font-weight: 900; transform: translateY(-2px); }

        #search-input {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; height: 45px; padding: 0 20px;
            border-radius: 50px; border: 2px solid transparent; background: rgba(255,255,255,0.95);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; 
            font-family: var(--font-main); outline: none; transition: 0.3s;
        }
        #search-input:focus { border-color: var(--brand); width: 90%; }

        /* BOTTOM SHEET */
        #bottom-sheet {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 60px; background: white; z-index: 500;
            border-radius: 24px 24px 0 0; padding: 0 20px 20px;
            transition: height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            touch-action: none; /* Controlled via JS for swiping */
            overflow: hidden;
        }

        .drag-handle { 
            width: 40px; height: 5px; background: #e5e7eb; 
            margin: 12px auto; border-radius: 10px; cursor: grab; flex-shrink: 0; 
        }

        .sheet-label { 
            font-size: 13px; 
            font-weight: 800; 
            color: #1a1a1a;
            text-transform: uppercase; 
            margin-bottom: 15px; 
            pointer-events: none; 
            flex-shrink: 0; 
            letter-spacing: 0.5px;
        }
        
        #station-list { 
            display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; 
            scrollbar-width: none; 
            opacity: 0; transition: opacity 0.3s ease;
            touch-action: pan-x;
        }
        
        #bottom-sheet.open #station-list { opacity: 1; }
        
        #station-list::-webkit-scrollbar { display: none; }
        .station-card { flex: 0 0 160px; cursor: pointer; text-align: left; }
        .station-card img { width: 100%; height: 95px; border-radius: 14px; object-fit: cover; border: 1px solid #f0f0f0; display: block; transition: transform 0.2s; }
        .station-card:active img { transform: scale(0.95); }
        .station-card span { font-size: 11px; font-weight: 700; display: block; margin-top: 8px; color: var(--dark); line-height: 1.2; }
        
        /* POPUP STYLING */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .popup-container { text-align: center; font-family: var(--font-main); }
        .popup-btn { background: var(--brand); color: white; border: none; padding: 12px 20px; margin-top: 10px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 12px; text-transform: uppercase; width: 100%; }
    </style>
</head>
<body>

    <input type="text" id="search-input" placeholder="Find a garden station..." onkeyup="filterStations()">
    <div id="map"></div>

    <div id="pano-overlay-container">
        <div class="pano-top-bar">
            <span class="pano-title">BagView 360° Experience</span>
            <button class="exit-pill-btn" id="header-exit-btn">Back to Map</button>
        </div>
        <iframe id="pano-frame" src="" allow="accelerometer; gyroscope; xr-spatial-tracking; fullscreen" allowfullscreen></iframe>
    </div>

    <div id="bottom-sheet">
        <div class="drag-handle" id="sheet-handle"></div>
        <div class="sheet-label">Explore Stations</div>
        <div id="station-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const stations = [
            { id: 1, y: 700, x: 125, name: 'Main Entrance', img: 'Assets/A2_Main Entrance.png', pano: 'https://tour.panoee.net/mainentrance/1' },
            { id: 2, y: 590, x: 135, name: 'Centennial Garden', img: 'Assets/Centennial Garden.png', pano: 'https://tour.panoee.net/centennial-garden/1' },
            { id: 3, y: 585, x: 565, name: 'Orchidarium', img: 'Assets/Orchidarium.png', pano: 'https://tour.panoee.net/orchidarium/1' },
            { id: 4, y: 885, x: 775, name: 'PMSEA Garden', img: 'Assets/PMSEA%20Garden.png', pano: 'https://tour.panoee.net/pmsea-garden' },
            { id: 5, y: 795, x: 955, name: 'Japanese Garden', img: 'Assets/Japanese%20Garden.png', pano: 'https://tour.panoee.net/japanese-garden' },
            { id: 6, y: 735, x: 875, name: 'Japanese Tunnel', img: 'Assets/Japanese%20Tunnel.png', pano: 'https://tour.panoee.net/japanese-tunnel/1' },
            { id: 7, y: 645, x: 805, name: 'Korea Garden', img: 'Assets/Korea%20Garden.png', pano: 'https://tour.panoee.net/korea-garden/1' },
            { id: 8, y: 495, x: 675, name: 'Chinese Garden', img: 'Assets/Chinese Garden.png', pano: 'https://tour.panoee.net/chinese-garden/69cd28ffcd728200084a2654' },
            { id: 9, y: 365, x: 610, name: 'Asian Garden', img: 'Assets/Asian Garden.png', pano: 'https://tour.panoee.net/asian-garden' },
            { id: 10, y: 445, x: 480, name: 'Arbor', img: 'Assets/Arbor.png', pano: 'https://tour.panoee.net/arbor' },
            { id: 11, y: 385, x: 740, name: 'City of Vaughan', img: 'Assets/City of Vaughan Friendship Garden.png', pano: 'https://tour.panoee.net/city-of-vaughan' },
            { id: 12, y: 295, x: 785, name: 'Philippine-Thailand Friendship Garden', img: 'Assets/Philippine-Thailand Friendship Garden.png', pano: 'https://tour.panoee.net/philippine-thailand-friendship-garden/7-1' },
            { id: 13, y: 155, x: 475, name: 'Cactus & Succulents', img: 'Assets/Cactus&Succulents.png', pano: 'https://tour.panoee.net/cactus-succulent-garden/1-1' },
            { id: 14, y: 280, x: 325, name: 'Cordillera Village', img: 'Assets/Cordillera%20Village.png', pano: 'https://tour.panoee.net/cordillera-village/1' },
            { id: 15, y: 335, x: 270, name: 'Green House', img: 'Assets/Greenhouse.png', pano: 'https://tour.panoee.net/greenhouse/1' },
        ];

        const bounds = [[0, 0], [1000, 1000]];
        const map = L.map('map', { 
            crs: L.CRS.Simple, 
            zoomControl: false, // Cleaner UI, we'll use fitBounds
            attributionControl: false,
            maxBounds: bounds, 
            maxBoundsViscosity: 1.0, 
            zoomSnap: 0.1
        });

        L.imageOverlay('Assets/A1_Map.png', bounds).addTo(map);
        map.fitBounds(bounds);

        const list = document.getElementById('station-list');
        const markers = {};

        stations.forEach(s => {
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="brand-pin-wrapper"><div class="brand-pin"></div><div class="pin-number">${s.id}</div></div>`,
                iconSize: [30, 30], iconAnchor: [15, 30]
            });

            const marker = L.marker([s.y, s.x], {icon}).addTo(map)
                .bindPopup(`<div class="popup-container"><b>${s.name}</b><br><button onclick="openPano('${s.pano}')" class="popup-btn">View 360°</button></div>`);
            
            markers[s.id] = marker;

            const card = document.createElement('div');
            card.className = 'station-card';
            card.innerHTML = `<img src="${s.img}"><span>${s.id}. ${s.name}</span>`;
            card.onclick = () => { 
                setSheetHeight(false);
                marker.openPopup(); 
                map.flyTo([s.y, s.x], 1.2, { duration: 1 });
            };
            list.appendChild(card);
        });

        const overlay = document.getElementById('pano-overlay-container');
        const frame = document.getElementById('pano-frame');
        const sheet = document.getElementById('bottom-sheet');
        const exitBtn = document.getElementById('header-exit-btn');

        function openPano(url) { 
            frame.src = url; 
            overlay.style.display = 'block'; 
            document.body.style.overflow = 'hidden';
        }
        
        function closePano() { 
            overlay.style.display = 'none'; 
            frame.src = ""; 
            document.body.style.overflow = 'auto';
        }
        
        exitBtn.onclick = closePano;

        /* REFINED SWIPE & SHEET LOGIC */
        let startY;
        const setSheetHeight = (isOpen) => {
            if (isOpen) {
                sheet.style.height = "280px";
                sheet.classList.add('open');
            } else {
                sheet.style.height = "60px";
                sheet.classList.remove('open');
            }
        };

        sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        sheet.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) setSheetHeight(true);
            if (endY - startY > 50) setSheetHeight(false);
        });

        document.getElementById('sheet-handle').onclick = () => {
            setSheetHeight(!sheet.classList.contains('open'));
        };

        // Delay opening to show off the map first
        setTimeout(() => setSheetHeight(true), 1200);

        function filterStations() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.station-card').forEach(c => {
                const name = c.querySelector('span').innerText.toLowerCase();
                c.style.display = name.includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
